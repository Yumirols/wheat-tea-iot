log_format farmeye '$remote_addr - $remote_user [$time_local] '
                   '"$request" $status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent"';

upstream farmeye_api {
    server api:8000;
    keepalive 32;
}

# 纯 HTTP 服务器（监听 80 端口）
server {
    listen 80;
    server_name _; # 匹配所有域名或直接 IP 访问

    # 限制上传图片大小限制
    client_max_body_size 10M;

    # 静态图片资源直接读取（通过宿主机卷映射直接挂载，不经过 FastAPI）
    location /images/ {
        alias /usr/share/nginx/images/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查
    location /api/v1/health {
        access_log off;
        proxy_pass http://farmeye_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # API 接口反向代理转发
    location /api/ {
        proxy_pass http://farmeye_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 升级支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时与缓冲配置
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
    }

    access_log /var/log/nginx/farmeye_access.log farmeye;
    error_log /var/log/nginx/farmeye_error.log warn;
}