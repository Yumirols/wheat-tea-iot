[alembic]
script_location = alembic
# sqlalchemy.url 不在此硬编码，由 alembic/env.py 从环境变量 DATABASE_URL 动态读取
# 以支持本地开发（localhost:5432）、Docker 容器内（db:5432）、测试环境的不同地址
# 详情参见 docs/2_vps-deployment.md §5.4.2

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
