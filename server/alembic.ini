[alembic]
script_location = alembic
# sqlalchemy.url is not hardcoded here, but read dynamically from DATABASE_URL env var by alembic/env.py
# to support local dev (localhost:5432), Docker container (db:5432), and test environments
# See docs/2_vps-deployment.md §5.4.2 for details

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
