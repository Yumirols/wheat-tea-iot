name: FarmEye Guard Server Test Verification

on:
  push:
    branches: [ "main", "master", "test-vps-auto-deploy" ]

  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'server/**'

jobs:
  test:
    name: Run Comprehensive Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies on Runner
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Configure environment files
        run: |
          cp server/.env.dev.example server/.env.dev
          # 将 localhost:5432 替换为容器间网络中 DB 的名称 db:5432
          sed -i 's/localhost:5432/db:5432/g' server/.env.dev
          cp server/.env.prod.example server/.env.prod

      - name: Start Docker Compose services
        run: |
          cd server
          docker compose --profile dev up -d --build api-dev db

      - name: Wait for database to be healthy
        run: |
          echo "Waiting for database to start..."
          until [ "$(docker inspect -f '{{.State.Health.Status}}' farmeye-db)" == "healthy" ]; do
            echo "Waiting for farmeye-db to be healthy..."
            sleep 2
          done
          echo "Database is healthy!"
          # 等待 Uvicorn 后端启动完成
          sleep 3

      - name: Run Ruff Lint Check
        run: |
          cd server
          docker compose exec -T api-dev ruff check app/ tests/

      - name: Run MyPy Type Check
        run: |
          cd server
          docker compose exec -T api-dev mypy app/

      - name: Run Unit Tests
        run: |
          cd server
          docker compose exec -T api-dev pytest tests/ -v --ignore=tests/integration --ignore=tests/docker --ignore=tests/e2e

      - name: Run Database Integration Tests
        run: |
          cd server
          docker compose exec -T api-dev pytest tests/integration/ -v --run-integration

      - name: Run End-to-End Tests (E2E)
        run: |
          python server/tests/integration_run.py

      - name: Shutdown Docker Compose services
        if: always()
        run: |
          cd server
          docker compose --profile dev down -v

  deploy:
    name: Deploy to VPS
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || github.ref == 'refs/heads/test-vps-auto-deploy')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure SSH Private Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Sync code to VPS via Rsync
        run: |
          rsync -avz --delete \
            --exclude='.venv' --exclude='__pycache__' --exclude='.git' \
            --exclude='*.pyc' --exclude='.env.*' \
            server/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/opt/farmeye/

      - name: Restart Services and Migrate Database on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
            cd /opt/farmeye
            # 以后台模式拉起生产容器组并重新编译
            docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile production up -d --build
            # 执行 Alembic 数据库增量迁移，若为首次对齐则执行 stamp 对齐
            docker compose exec -T api alembic upgrade head || docker compose exec -T api alembic stamp head
          "
